<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Falling Heart | Agrima</title>
    <!-- Premium font for the text -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            /* Cosmic dark background maintain kar rahe hain */
            background-color: #000000;
            background-image: radial-gradient(circle at center, #110008 0%, #000000 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #transitionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Agle page par jane ka button jo blast ke baad aayega */
        #next-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            pointer-events: none; /* Jab tak dikhe na tab tak click na ho */
            transition: opacity 2s ease-in-out;
        }

        #next-stage h2 {
            font-family: 'Cinzel', serif;
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
            letter-spacing: 2px;
        }

        .continue-btn {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: #ffffff;
            border: 1px solid #ff4d6d;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.3), inset 0 0 10px rgba(255, 77, 109, 0.3);
            transition: 0.4s;
        }

        .continue-btn:active {
            background: #ff4d6d;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.8);
            transform: scale(0.95);
        }

        /* Subtle back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>
    <canvas id="transitionCanvas"></canvas>

    <!-- Ye blast ke baad dikhega -->
    <div id="next-stage">
        <h2>Do dilon ka connection...</h2>
        <a href="connection.html" class="continue-btn">Aage Badhein ✨</a>
    </div>

    <script>
        const canvas = document.getElementById('transitionCanvas');
        const ctx = canvas.getContext('2d');

        // Screen resize logic
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Animation States
        let state = 'falling'; // 'falling', 'shattering', 'done'
        
        // --- 1. The Falling Heart Logic ---
        let heart = {
            x: canvas.width / 2,
            y: -100, // Upar se aayega
            size: 40,
            vy: 2, // Girne ki speed
            glow: 0,
            angle: 0
        };

        // --- 2. Particles for the Shatter Explosion ---
        let particles = [];
        const particleColors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#ffffff'];

        function createExplosion(x, y) {
            // 200 glowing particles create karenge explosion ke liye
            for (let i = 0; i < 200; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 8 + 2; // Blast ki speed
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 1,
                    color: particleColors[Math.floor(Math.random() * particleColors.length)],
                    life: 1.0, // Fade hone ke liye
                    decay: Math.random() * 0.015 + 0.005 // Kitni jaldi gayab hoga
                });
            }
        }

        // Custom path se heart draw karna (Premium look ke liye)
        function drawHeart(x, y, size, glowIntensity) {
            ctx.save();
            ctx.translate(x, y);
            
            // Dhadkane wala effect (Pulse)
            let scale = 1 + Math.sin(Date.now() * 0.005) * 0.1;
            ctx.scale(scale, scale);

            // Glow effect
            ctx.shadowBlur = glowIntensity;
            ctx.shadowColor = '#ff4d6d';
            ctx.fillStyle = '#ff4d6d';

            ctx.beginPath();
            let topCurveHeight = size * 0.3;
            ctx.moveTo(0, topCurveHeight);
            // Left curve
            ctx.bezierCurveTo(
                -size / 2, -topCurveHeight, 
                -size, topCurveHeight, 
                0, size
            );
            // Right curve
            ctx.bezierCurveTo(
                size, topCurveHeight, 
                size / 2, -topCurveHeight, 
                0, topCurveHeight
            );
            ctx.fill();
            ctx.restore();
        }

        // --- 3. Main Animation Loop ---
        function animate() {
            // Halka sa fade effect motion blur ke liye
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state === 'falling') {
                // Heart ko neeche girana
                heart.vy += 0.05; // Gravity
                heart.y += heart.vy;
                
                // Halka sa left-right sway motion
                heart.x = canvas.width / 2 + Math.sin(Date.now() * 0.002) * 20;
                
                // Glow badhega jaise-jaise neeche aayega
                heart.glow = (heart.y / (canvas.height / 2)) * 50;

                drawHeart(heart.x, heart.y, heart.size, heart.glow);

                // Agar heart center me aa gaya, toh shatter (blast) kar do
                if (heart.y >= canvas.height / 2) {
                    state = 'shattering';
                    createExplosion(heart.x, heart.y);
                }
            } 
            else if (state === 'shattering') {
                let allDead = true;

                // Particles ko animate karna
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    
                    if (p.life > 0) {
                        allDead = false;
                        
                        // Physics: Friction & Gravity
                        p.vx *= 0.96; // Hawa ka rukawat
                        p.vy *= 0.96;
                        p.vy += 0.1; // Halka sa gravity neeche ki taraf
                        
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;

                        // Draw particle
                        ctx.globalAlpha = Math.max(0, p.life);
                        ctx.fillStyle = p.color;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1.0; // Reset alpha
                ctx.shadowBlur = 0;

                // Agar saari chingariyan gayab ho gayi, toh Next button dikhao
                if (allDead) {
                    state = 'done';
                    let nextStageUI = document.getElementById('next-stage');
                    nextStageUI.style.opacity = '1';
                    nextStageUI.style.pointerEvents = 'auto'; // Ab click kar sakte hain
                }
            }

            requestAnimationFrame(animate);
        }

        // Thoda delay ke baad animation start karo
        setTimeout(animate, 500);

    </script>
</body>
</html>
