<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cosmic ECG Connection | Kunal & Agrima</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Phone par tap highlight aur selection disable karne ke liye */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            /* Real Deep Space Black Background */
            background-color: #000000;
            background-image: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        #stringCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- THE NODES (K & A) --- */
        .node-container {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Positions for left and right */
        #nodeK-container { left: 10%; }
        #nodeA-container { right: 10%; }

        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            background: #000;
        }

        /* Kunal Node (Blue Energy) */
        #nodeK {
            color: #00d4ff;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6), inset 0 0 10px rgba(0, 212, 255, 0.4);
        }

        /* Agrima Node (Pink Energy) */
        #nodeA {
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.6), inset 0 0 10px rgba(255, 77, 109, 0.4);
        }

        /* Hint Text */
        .tap-label {
            margin-top: 15px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.7;
            animation: pulseText 1.5s infinite;
            transition: opacity 0.5s;
        }

        @keyframes pulseText { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        /* Dhadkan Animation (Node Beat) */
        @keyframes nodeBeat {
            0% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
            15% { transform: scale(1.3); box-shadow: 0 0 40px currentColor; }
            30% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
            45% { transform: scale(1.2); box-shadow: 0 0 35px currentColor; }
            60%, 100% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
        }
        .beat { animation: nodeBeat 0.8s ease-in-out; }

        /* Sahi Back Button (Jo index.html par jayega) */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <!-- Back dabaane par main page khulega -->
    <a href="index.html" class="back-btn">← Menu</a>

    <canvas id="stringCanvas"></canvas>

    <!-- KUNAL NODE -->
    <div id="nodeK-container" class="node-container">
        <div id="nodeK" class="node">K</div>
        <div id="labelK" class="tap-label">TAP ME</div>
    </div>

    <!-- AGRIMA NODE -->
    <div id="nodeA-container" class="node-container">
        <div id="nodeA" class="node">A</div>
        <div id="labelA" class="tap-label">TAP ME</div>
    </div>

    <script>
        const canvas = document.getElementById('stringCanvas');
        const ctx = canvas.getContext('2d');
        let cw, ch;
        
        function resize() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INTERACTION STATES ---
        let kActive = false;
        let aActive = false;
        let progK = 0; // K ki string kitni aage badhi (0 to 1)
        let progA = 0; // A ki string kitni aage badhi (0 to 1)
        
        let connected = false;
        let pulseActive = false;
        let pulseT = 0; // ECG wave ki position (0 to 1)
        let pulseDirection = 1; // 1 = K to A, -1 = A to K

        // Nodes ki fixed positions
        let posK = { x: 0, y: 0 };
        let posA = { x: 0, y: 0 };

        // --- BACKGROUND STARS ---
        const stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                s: Math.random() * 1.5,
                alpha: Math.random() * 0.5 + 0.1
            });
        }

        // --- STRINGS DATA (Multiple Energy Lines) ---
        const strings = [
            { isECG: true, color: '#ffffff', width: 3, glow: 15, freq: 1, amp: 0, phase: 0 },
            { isECG: false, color: '#00d4ff', width: 2, glow: 10, freq: 3, amp: 30, phase: 0 },
            { isECG: false, color: '#ff4d6d', width: 2, glow: 10, freq: 4, amp: -40, phase: 1 },
            { isECG: false, color: '#b100ff', width: 1.5, glow: 8, freq: 2, amp: 20, phase: 2 }
        ];

        // --- EVENT LISTENERS ---
        document.getElementById('nodeK').addEventListener('click', () => {
            if(kActive) return;
            kActive = true;
            document.getElementById('labelK').style.opacity = 0;
            triggerBeat('K');
        });

        document.getElementById('nodeA').addEventListener('click', () => {
            if(aActive) return;
            aActive = true;
            document.getElementById('labelA').style.opacity = 0;
            triggerBeat('A');
        });

        function triggerBeat(nodeId) {
            let el = document.getElementById('node' + nodeId);
            el.classList.remove('beat');
            void el.offsetWidth; // Reflow for restart animation
            el.classList.add('beat');
        }

        // --- MATHEMATICAL ECG WAVE FUNCTION (_/\_) ---
        // Ye function real P-Q-R-S-T wave draw karta hai
        function ecgWave(d) {
            let x = d * 60; // Spread of the pulse
            if (x > 4 || x < -4) return 0; // Flat line outside pulse
            
            // P wave (Chota bump aage)
            if (x > 1.5 && x < 3) return -8 * Math.sin((x - 1.5) * Math.PI / 1.5);
            // Q dip (Halka sa neeche)
            if (x > 0.5 && x <= 1.5) return 12 * Math.sin((1.5 - x) * Math.PI);
            // R spike (Sabse bada upward spike)
            if (x > -0.5 && x <= 0.5) return -70 * Math.cos(x * Math.PI);
            // S dip (Spike ke baad neeche jana)
            if (x > -1.5 && x <= -0.5) return 20 * Math.sin((x + 1.5) * Math.PI);
            // T wave (Pichhe ka ek aur bump)
            if (x > -3.5 && x <= -1.5) return -12 * Math.sin((x + 3.5) * Math.PI / 2);
            
            return 0;
        }

        // --- DRAW FUNCTIONS ---
        
        // Jab strings connect ho rahi hoti hain
        function drawTendril(start, end, progress, str, time, dir) {
            ctx.beginPath();
            ctx.lineWidth = str.width;
            ctx.lineCap = 'round';
            ctx.shadowBlur = str.glow;
            ctx.shadowColor = str.color;
            ctx.strokeStyle = str.color;
            
            // Kitni door tak draw karna hai
            let targetX = start.x + (end.x - start.x) * progress;
            let targetY = start.y + (end.y - start.y) * progress;
            
            for(let t=0; t<=1; t+=0.02) {
                let x = start.x + (targetX - start.x) * t;
                let y = start.y + (targetY - start.y) * t;
                
                // Wiggle motion (Hawa mein leharana)
                let wiggle = Math.sin(t * 10 * str.freq + (time * 5 * dir) + str.phase) * str.amp * t;
                if(str.isECG) wiggle *= 0.1; // Main line ko thoda seedha rakhne ke liye
                
                if(t===0) ctx.moveTo(x, y + wiggle);
                else ctx.lineTo(x, y + wiggle);
            }
            ctx.stroke();
        }

        // Jab strings poori jud chuki hain
        function drawFullConnection(p1, p2, str, time) {
            ctx.beginPath();
            ctx.lineWidth = str.width;
            ctx.lineCap = 'round';

            // Gradient colors (Blue se Pink)
            let grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
            grad.addColorStop(0, '#00d4ff');
            grad.addColorStop(1, '#ff4d6d');

            ctx.strokeStyle = str.isECG ? grad : str.color;
            
            // ECG pulse ke glow ko direction ke hisaab se color dena
            if (str.isECG && pulseActive) {
                ctx.shadowColor = pulseDirection === 1 ? '#00d4ff' : '#ff4d6d';
                ctx.shadowBlur = 25;
            } else {
                ctx.shadowColor = str.color;
                ctx.shadowBlur = str.glow;
            }

            // Line draw karna
            for (let t = 0; t <= 1; t += 0.005) { // Precision for smooth ECG
                let x = p1.x + (p2.x - p1.x) * t;
                let y = p1.y + (p2.y - p1.y) * t;
                
                let yOff = 0;
                
                if (str.isECG && pulseActive) {
                    // Calculate distance from the traveling pulse
                    let d = t - pulseT; 
                    // ECG wave ko direction ke hisaab se flip karna taaki sahi lage
                    yOff = ecgWave(d * pulseDirection); 
                } else if (!str.isECG) {
                    // Ambient strings ki wave
                    yOff = Math.sin(t * 10 * str.freq + time + str.phase) * str.amp;
                }
                
                if (t === 0) ctx.moveTo(x, y + yOff);
                else ctx.lineTo(x, y + yOff);
            }
            ctx.stroke();
        }

        // --- MAIN ANIMATION LOOP ---
        function animate() {
            // Trail effect (Glowing motion blur)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, cw, ch);
            
            // Draw Background Stars
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0;
            stars.forEach(s => {
                ctx.globalAlpha = s.alpha;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1; // Reset

            // Update node positions based on screen size
            posK = { x: cw * 0.10 + 30, y: ch / 2 };
            posA = { x: cw * 0.90 - 30, y: ch / 2 };
            let center = { x: cw / 2, y: ch / 2 };
            let time = Date.now() * 0.002;

            // Update Connection Progress
            if (kActive && progK < 1) progK += 0.015;
            if (aActive && progA < 1) progA += 0.015;

            if (progK >= 1 && progA >= 1 && !connected) {
                connected = true;
                pulseActive = true; // Connection hote hi heartbeat shuru
            }

            // Draw Strings
            strings.forEach(str => {
                if (!connected) {
                    // Agar abhi connect nahi huye hain toh center ki taraf badho
                    if (progK > 0) drawTendril(posK, center, progK, str, time, 1);
                    if (progA > 0) drawTendril(posA, center, progA, str, time, -1);
                } else {
                    // Poori jud chuki hain
                    drawFullConnection(posK, posA, str, time);
                }
            });

            // Update ECG Pulse traveling logic
            if (pulseActive) {
                pulseT += 0.01 * pulseDirection; // Pulse speed
                
                if (pulseT >= 1) {
                    pulseT = 1; 
                    pulseDirection = -1; // A se wapas K ki taraf
                    triggerBeat('A'); // Agrima node ko dhadkao
                } else if (pulseT <= 0) {
                    pulseT = 0; 
                    pulseDirection = 1; // K se wapas A ki taraf
                    triggerBeat('K'); // Kunal node ko dhadkao
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
