<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cosmic ECG Connection | Kunal & Agrima</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            /* Pure dark cosmic universe background */
            background-color: #000000;
            background-image: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        #stringCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- THE NODES (K & A) --- */
        .node-container {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #nodeK-container { left: 10%; }
        #nodeA-container { right: 10%; }

        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            background: #000;
        }

        /* Kunal Node (Blue) */
        #nodeK {
            color: #00d4ff;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6), inset 0 0 10px rgba(0, 212, 255, 0.4);
        }

        /* Agrima Node (Pink/Red) */
        #nodeA {
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.6), inset 0 0 10px rgba(255, 77, 109, 0.4);
        }

        .tap-label {
            margin-top: 15px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.7;
            animation: pulseText 1.5s infinite;
            transition: opacity 0.5s;
        }

        @keyframes pulseText { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        /* Node Heartbeat Animation (Scale) */
        @keyframes nodeBeat {
            0% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
            15% { transform: scale(1.3); box-shadow: 0 0 40px currentColor; }
            30% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
            45% { transform: scale(1.2); box-shadow: 0 0 35px currentColor; }
            60%, 100% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
        }
        .beat { animation: nodeBeat 0.8s ease-in-out; }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <a href="transition.html" class="back-btn">← Back</a>

    <canvas id="stringCanvas"></canvas>

    <div id="nodeK-container" class="node-container">
        <div id="nodeK" class="node">K</div>
        <div id="labelK" class="tap-label">TAP ME</div>
    </div>

    <div id="nodeA-container" class="node-container">
        <div id="nodeA" class="node">A</div>
        <div id="labelA" class="tap-label">TAP ME</div>
    </div>

    <script>
        const canvas = document.getElementById('stringCanvas');
        const ctx = canvas.getContext('2d');
        let cw, ch;
        
        function resize() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- STATES ---
        let kActive = false;
        let aActive = false;
        let connected = false;
        let connectionProgress = 0; // 0 to 1

        let pulseActive = false;
        let pulseT = 0; // 0 (K) to 1 (A)
        let pulseDirection = 1; // 1 = K to A, -1 = A to K

        // Node Positions
        let posK = { x: cw * 0.10 + 30, y: ch * 0.5 };
        let posA = { x: cw * 0.90 - 30, y: ch * 0.5 };

        // --- MULTIPLE ENERGY STRINGS SETUP ---
        // 1 Main ECG string + 4 Ambient glowing strings
        const strings = [
            { isECG: true, amp: 20, freq: 1.5, phase: 0, width: 4, alpha: 1 },
            { isECG: false, amp: 50, freq: 2.1, phase: Math.PI/2, width: 2, alpha: 0.4 },
            { isECG: false, amp: -60, freq: 1.8, phase: Math.PI, width: 2, alpha: 0.3 },
            { isECG: false, amp: 30, freq: 2.5, phase: Math.PI*1.5, width: 1.5, alpha: 0.5 },
            { isECG: false, amp: -40, freq: 3.0, phase: Math.PI/4, width: 1, alpha: 0.6 }
        ];

        // --- INTERACTION ---
        document.getElementById('nodeK').addEventListener('click', () => {
            if(kActive) return;
            kActive = true;
            document.getElementById('labelK').style.opacity = 0;
            triggerBeat('K');
            checkConnection();
        });

        document.getElementById('nodeA').addEventListener('click', () => {
            if(aActive) return;
            aActive = true;
            document.getElementById('labelA').style.opacity = 0;
            triggerBeat('A');
            checkConnection();
        });

        function checkConnection() {
            if (kActive && aActive && !connected) {
                setTimeout(() => { connected = true; }, 400); // Thoda ruk kar connect hoga
            }
        }

        function triggerBeat(nodeId) {
            let el = document.getElementById('node' + nodeId);
            el.classList.remove('beat');
            void el.offsetWidth; // Force reflow
            el.classList.add('beat');
        }

        // --- MATH: BEZIER POINT ---
        function getBezierPoint(t, p0, p1, p2, p3) {
            let cX = 3 * (p1.x - p0.x), bX = 3 * (p2.x - p1.x) - cX, aX = p3.x - p0.x - cX - bX;
            let x = (aX * Math.pow(t, 3)) + (bX * Math.pow(t, 2)) + (cX * t) + p0.x;
            let cY = 3 * (p1.y - p0.y), bY = 3 * (p2.y - p1.y) - cY, aY = p3.y - p0.y - cY - bY;
            let y = (aY * Math.pow(t, 3)) + (bY * Math.pow(t, 2)) + (cY * t) + p0.y;
            return { x, y };
        }

        // --- MATH: REAL ECG WAVEFORM (_/\_) ---
        function getEcgOffset(dt) {
            // dt is the distance from the pulse center. Range approx -0.1 to 0.1
            let x = dt * 100; // Stretch it to make mathematical peaks easier
            
            // x > 0 is the FRONT of the wave (moving forward)
            // x < 0 is the TAIL of the wave
            
            if (x < -5 || x > 5) return 0; // Baseline

            // T-wave (Small bump at the back)
            if (x >= -4.5 && x < -2.5) return -12 * Math.sin((x + 4.5) * Math.PI / 2);
            
            // S-wave (Dip down after spike)
            if (x >= -2 && x < -1) return 25 * (x + 2); // Goes down to Y=25
            
            // R-wave (The HUGE upward spike)
            if (x >= -1 && x < 0) return 25 - 115 * (x + 1); // Shoots UP to Y=-90
            
            // Q-wave (Dip before spike)
            if (x >= 0 && x < 1) return -90 + 105 * x; // Shoots DOWN to Y=15
            if (x >= 1 && x < 1.5) return 15 - 30 * (x - 1); // Back to baseline Y=0
            
            // P-wave (Small bump at the front)
            if (x >= 2.5 && x < 4.5) return -8 * Math.sin((x - 2.5) * Math.PI / 2);

            return 0;
        }

        // --- MAIN ANIMATION LOOP ---
        function draw() {
            // Dark trail effect for glowing neon strings
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, cw, ch);

            posK = { x: cw * 0.10 + 30, y: ch * 0.5 };
            posA = { x: cw * 0.90 - 30, y: ch * 0.5 };

            let time = Date.now() * 0.002;
            
            // Floating control points for the main bezier curve
            let cp1 = { x: posK.x + (cw * 0.3), y: posK.y + Math.sin(time) * 100 };
            let cp2 = { x: posA.x - (cw * 0.3), y: posA.y + Math.cos(time * 0.8) * 100 };

            // Draw all strings
            strings.forEach((str, index) => {
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineWidth = str.width;

                // Gradient for strings (Blue to Pink)
                let grad = ctx.createLinearGradient(posK.x, posK.y, posA.x, posA.y);
                grad.addColorStop(0, `rgba(0, 212, 255, ${str.alpha})`);
                grad.addColorStop(1, `rgba(255, 77, 109, ${str.alpha})`);
                
                // Active Pulse string is super bright
                if (str.isECG) {
                    grad = ctx.createLinearGradient(posK.x, posK.y, posA.x, posA.y);
                    grad.addColorStop(0, '#00d4ff');
                    grad.addColorStop(1, '#ff4d6d');
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = pulseDirection === 1 ? '#00d4ff' : '#ff4d6d';
                } else {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#ffffff';
                }

                ctx.strokeStyle = grad;

                // 1. Unconnected state (Floating strings)
                if (!connected) {
                    if (kActive) {
                        ctx.moveTo(posK.x, posK.y);
                        let floatX = posK.x + (cw * 0.3) + Math.sin(time * str.freq + str.phase) * 100;
                        let floatY = posK.y + Math.cos(time * str.freq) * str.amp * 2;
                        ctx.quadraticCurveTo(posK.x + 50, posK.y + str.amp, floatX, floatY);
                        ctx.stroke();
                    }
                    if (aActive) {
                        ctx.beginPath();
                        ctx.moveTo(posA.x, posA.y);
                        let floatX = posA.x - (cw * 0.3) + Math.cos(time * str.freq + str.phase) * 100;
                        let floatY = posA.y + Math.sin(time * str.freq) * str.amp * 2;
                        ctx.quadraticCurveTo(posA.x - 50, posA.y - str.amp, floatX, floatY);
                        ctx.stroke();
                    }
                } 
                // 2. Connected state (Joined strings + ECG)
                else {
                    if (connectionProgress < 1) connectionProgress += 0.005; // Lines joining speed
                    else if (!pulseActive && str.isECG) pulseActive = true;

                    let step = str.isECG ? 0.002 : 0.02; // High resolution for ECG, low for ambient
                    ctx.moveTo(posK.x, posK.y);

                    for (let t = 0; t <= connectionProgress; t += step) {
                        let pt = getBezierPoint(t, posK, cp1, cp2, posA);
                        
                        let yOffset = 0;

                        // Ambient string waves
                        if (!str.isECG) {
                            yOffset = Math.sin(t * Math.PI * str.freq + time + str.phase) * str.amp;
                        } 
                        // The Real ECG Wave logic
                        else if (pulseActive) {
                            // Calculate distance from pulse center
                            let dt = pulseDirection === 1 ? (t - pulseT) : (pulseT - t);
                            yOffset = getEcgOffset(dt);
                        }

                        ctx.lineTo(pt.x, pt.y + yOffset);
                    }
                    ctx.stroke();
                }
            });

            // 3. Update ECG Pulse Position
            if (pulseActive && connected) {
                pulseT += 0.008 * pulseDirection; // Pulse traveling speed

                // When pulse reaches Agrima
                if (pulseT >= 1) {
                    pulseT = 1;
                    pulseDirection = -1; // Reflect back
                    triggerBeat('A');
                } 
                // When pulse reaches Kunal
                else if (pulseT <= 0) {
                    pulseT = 0;
                    pulseDirection = 1; // Reflect forward
                    triggerBeat('K');
                }
            }

            requestAnimationFrame(draw);
        }

        // Add some random static background stars
        const bgStars = [];
        for(let i=0; i<100; i++) {
            bgStars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                s: Math.random() * 1.5
            });
        }
        function drawBgStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            bgStars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
                ctx.fill();
            });
        }

        // Inject background stars into the loop
        const originalDraw = draw;
        draw = function() {
            originalDraw();
            drawBgStars();
        }

    </script>
</body>
</html>
