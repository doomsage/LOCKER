<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ancient Scrolls | Agrima</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold-glow: rgba(212, 175, 55, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505; /* Pitch Black for Magic Contrast */
            height: 100vh;
            overflow: hidden;
            perspective: 2000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Magical Smoke/Fog Background */
        .fog {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a0a15 0%, #050505 100%);
            z-index: -1;
        }

        /* The Letter Container */
        .scroll-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .scroll {
            position: absolute;
            width: 320px;
            height: 450px;
            /* Ancient Paper Texture Image */
            background: url('https://img.freepik.com/free-photo/vintage-paper-texture-background_53876-127633.jpg?t=st=1711963200~exp=1711966800~hmac=50e487198756987654321') no-repeat center center;
            background-size: cover;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--gold-glow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            /* To make text look burnt in */
            filter: sepia(0.3) contrast(1.1);
        }

        .scroll h2 {
            font-family: 'Cinzel Decorative', cursive;
            color: #4a2c0f;
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.3);
        }

        .scroll p {
            font-family: 'Dancing Script', cursive;
            color: #2b1b0a;
            font-size: 1.6rem;
            line-height: 1.3;
            font-weight: 700;
        }

        /* Floating Sparks */
        .spark {
            position: absolute; width: 4px; height: 4px;
            background: #d4af37; border-radius: 50%;
            box-shadow: 0 0 10px #d4af37;
            pointer-events: none;
        }

        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: #d4af37; font-family: 'Cinzel Decorative'; text-decoration: none;
            border: 1px solid #d4af37; padding: 8px 15px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="fog"></div>
    <a href="index.html" class="back-link">← Return</a>

    <div class="scroll-container" id="main-container"></div>

    <script>
        const data = [
            { h: "The Prophecy", p: "Agrima, tumhare aane se meri duniya mein noor aa gaya..." },
            { h: "Enchanted", p: "Tumhari aankhon mein wo jadu hai jo waqt rok deta hai." },
            { h: "Destiny", p: "Kunal aur Agrima ki kahani sitaron mein likhi hai." },
            { h: "The Secret", p: "Mera har ek din tumhare bina adhoora hai, Agrima." },
            { h: "Eternal", p: "Ye panna kabhi khatam nahi hoga, kyunki mera pyaar anant hai." }
        ];

        let index = 0;

        function spawnScroll() {
            const container = document.getElementById('main-container');
            const scroll = document.createElement('div');
            scroll.className = 'scroll';
            scroll.innerHTML = `
                <h2>${data[index].h}</h2>
                <p>${data[index].p}</p>
            `;
            container.appendChild(scroll);

            // Infinite Cinematic Movement (Z-Axis flow)
            // Start from very far back, move past the user
            const tl = gsap.timeline({
                onComplete: () => {
                    scroll.remove();
                    // Spawning next one immediately for "Non-stop" feel
                }
            });

            tl.fromTo(scroll, 
                { z: -2000, opacity: 0, rotateY: 45, rotateX: 10, x: gsap.utils.random(-100, 100) },
                { 
                    z: 1000, 
                    opacity: 1, 
                    rotateY: -20, 
                    duration: 6, // Slow and majestic
                    ease: "none",
                    // Increase opacity quickly, then stay visible, then fade as it passes
                    onUpdate: function() {
                        const progress = this.progress();
                        if(progress > 0.8) gsap.set(scroll, { opacity: 1 - (progress - 0.8) * 5 });
                    }
                }
            );

            index = (index + 1) % data.length;
            
            // Interval for the next scroll - makes them overlap beautifully
            setTimeout(spawnScroll, 3000);
        }

        // Sparks Particle System
        function createSparks() {
            for(let i=0; i<30; i++) {
                let s = document.createElement('div');
                s.className = 'spark';
                document.body.appendChild(s);
                animateSpark(s);
            }
        }

        function animateSpark(el) {
            gsap.set(el, { x: Math.random() * window.innerWidth, y: window.innerHeight + 10 });
            gsap.to(el, {
                y: -50,
                x: "+=" + gsap.utils.random(-100, 100),
                duration: gsap.utils.random(3, 7),
                repeat: -1,
                ease: "none",
                delay: Math.random() * 5
            });
        }

        window.onload = () => {
            spawnScroll();
            createSparks();
        };
    </script>
</body>
</html>
