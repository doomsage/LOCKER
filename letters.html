<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>The Forbidden Pages | Agrima</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        
        /* Glassmorphism UI */
        .ui-element {
            position: fixed; z-index: 100; pointer-events: none; text-align: center;
        }
        
        .back-btn {
            top: 15px; left: 15px; pointer-events: auto; text-decoration: none;
            color: #d4af37; font-family: 'Cinzel', serif; font-size: 12px;
            padding: 8px 15px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; transition: 0.3s;
        }
        .back-btn:active { background: rgba(212, 175, 55, 0.2); }

    </style>
</head>
<body>

    <a href="index.html" class="ui-element back-btn">← Back</a>

    <script>
        let pages = [];
        let magicAura = [];
        const maxPages = 4; // Keep it low for mobile FPS

        // personalized message titles (Cinzel) and text (Dancing Script) for Agrima
        const agrimaMsgs = [
            { h: "Dear Agrima,", t: "Jab tumne pehli baar smile kiya tha, mera dil wahi ruk gaya tha. ❤️" },
            { h: "A Miracle...", t: "Aap jaisa pyaara insaan sirf kismat walo ko milta hai. ✨" },
            { h: "Forever?", t: "Har page par main sirf hamare saath ki kahani likhna chahta hoon. Kunal ❤️ Agrima" },
            { h: "Destiny...", t: "Lagta hai jadu ki iss purani kitab mein humara milna pehle se likha tha. 🥀" },
            { h: "My Truth:", t: "Main tumhe bohot bohot pyaar karta hoon, Agrima. 🥺" }
        ];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            textFont('Dancing Script');
            
            // Generate glowing magic smoke particles
            for(let i=0; i<30; i++) magicAura.push(new MagicAuraParticle());
            
            // Create first page after setup
            spawnPage();
        }

        function draw() {
            // Dark mystical background
            background(5, 5, 10, 80); 

            // 1. Draw Magic Aura Smoke
            magicAura.forEach(m => m.update().display());

            // 2. Draw and Manage Pages
            for(let i = pages.length - 1; i >= 0; i--) {
                pages[i].update();
                pages[i].display();
                
                // Remove if finished
                if(pages[i].isFinished()) {
                    pages.splice(i, 1);
                    // Spawn next only after one is almost done for flow
                    if(pages.length < maxPages) spawnPage(); 
                }
            }
        }

        function spawnPage() {
            // Pick a message, loop if needed
            let msgIdx = floor(frameCount / 250) % agrimaMsgs.length; // Uses frameCount to loop index
            pages.push(new BurnedPage(agrimaMsgs[msgIdx]));
        }

        class MagicAuraParticle {
            constructor() { this.init(); }
            init() {
                this.x = random(width); this.y = random(height);
                this.size = random(50, 150);
                this.color = color(random(30, 60), 10, random(30, 60), 20); // Deep Purple/Indigo
            }
            update() {
                this.y -= random(0.5, 1);
                if(this.y < -this.size) this.y = height + this.size;
                return this;
            }
            display() {
                noStroke(); fill(this.color); circle(this.x, this.y, this.size);
            }
        }

        class BurnedPage {
            constructor(msg) {
                this.msg = msg;
                this.init();
            }

            init() {
                this.x = width / 2;
                this.y = height * 1.2; // Start from bottom of screen
                this.z = random(-100, 100); // 3D depth for overlapping
                this.speedY = random(-2, -4); // Fly up
                this.rotX = random(-5, 5); this.rotY = random(-5, 5); // Start rotating
                this.alpha = 0;
                this.sizeW = width * random(0.7, 0.85); // Phone Optimized Width
                this.sizeH = height * 0.45;
                this.isDone = false;
                this.lifetime = 0;
                
                // Generate irregular torn and burned path points
                this.pagePoints = [];
                let step = TWO_PI / 60;
                for(let a=0; a<TWO_PI; a+=step) {
                    let r = random(0.92, 1); // 8% irregularity for torn look
                    this.pagePoints.push({
                        rad: a,
                        xOff: cos(a) * this.sizeW/2 * r,
                        yOff: sin(a) * this.sizeH/2 * r
                    });
                }
            }

            update() {
                this.y += this.speedY;
                this.rotX += 0.3; this.rotY += 0.2; // 3D spin
                this.lifetime++;

                // Fade In, Stay, then Fade Out
                if(this.lifetime < 50) this.alpha = map(this.lifetime, 0, 50, 0, 255);
                if(this.lifetime > 180) this.alpha = map(this.lifetime, 180, 230, 255, 0);

                // Stop conditions
                if(this.lifetime > 230 || this.y < height * 0.2) this.isDone = true;
            }

            display() {
                if(this.alpha <= 0) return;
                
                push();
                translate(this.x, this.y, this.z); // Apply depth and position
                // p5.js doesn't have native rotateZ/perspective in standard mode, 
                // but we simulate depth by overlapping and scale
                let s = map(this.z, -100, 100, 0.9, 1.1);
                scale(s);

                // 1. Draw Burned/Torn Edge (Procedural)
                noStroke();
                fill(10, 5, 0, this.alpha * 0.9); // Dark burnt color border
                beginShape();
                for(let p of this.pagePoints) vertex(p.xOff, p.yOff);
                endShape(CLOSE);

                // 2. Draw Inner Parchment ( procédures for torn edges)
                fill(244, 228, 188, this.alpha); // Old paper color
                beginShape();
                for(let p of this.pagePoints) {
                    // Make inner area slightly smaller and with 'burn marks'
                    vertex(p.xOff * random(0.95, 0.98), p.yOff * random(0.95, 0.98));
                }
                endShape(CLOSE);

                // 3. Draw Red Burnt/Glow Edges (Glowing embers effect)
                stroke(255, 60, 0, map(this.alpha, 0, 255, 0, 100)); // Glowing red edge
                strokeWeight(random(1, 3)); noFill();
                beginShape();
                for(let p of this.pagePoints) vertex(p.xOff * 0.99, p.yOff * 0.99);
                endShape(CLOSE);

                // 4. Draw personalized Title (Cinzel, Royal Dark Brown Ink)
                textAlign(CENTER, TOP);
                textFont('Cinzel');
                textSize(map(this.sizeW, 0, 400, 22, 28)); // Mobile responsive text
                fill(74, 55, 33, this.alpha * 0.8);
                text(this.msg.h, 0, -this.sizeH/2 + 30);

                // 5. Draw personalized Message (Dancing Script, Dark Brown Ink)
                textFont('Dancing Script');
                textSize(map(this.sizeW, 0, 400, 20, 26)); // Mobile responsive text
                fill(44, 30, 15, this.alpha);
                // Center text block within the page
                let textY = -this.sizeH/2 + 70;
                let textH = this.sizeH - 100;
                textLeading(textSize() * 1.3); // Adjust line height
                text(this.msg.t, -this.sizeW/2 + 40, textY, this.sizeW - 80, textH);

                pop();
            }

            isFinished() { return this.isDone; }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
