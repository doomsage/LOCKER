<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Letters | Agrima</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <!-- GSAP for 3D Camera Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            /* Create a 3D space */
            perspective: 1000px;
            perspective-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- SUPER GALAXY BACKGROUND --- */
        #galaxy-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- 3D SCENE CONTAINER --- */
        #scene-3d {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- REAL ANCIENT PAPER --- */
        .ancient-scroll {
            position: absolute;
            /* Use a real transparent PNG of old torn paper */
            background-image: url('https://png.pngtree.com/png-clipart/20230810/original/pngtree-old-paper-texture-vintage-parchment-picture-image_7838575.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Responsive sizes for mobile */
            width: 85vw;
            max-width: 400px;
            height: 60vh;
            max-height: 600px;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10% 15%; /* Keep text inside the paper bounds */
            
            /* Add some magical glow around the paper */
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            
            /* Start hidden and far away */
            opacity: 0;
            transform: translateZ(-2000px); 
            will-change: transform, opacity;
        }

        /* --- TEXT STYLING ON PAPER --- */
        .scroll-title {
            font-family: 'Cinzel', serif;
            color: #ffa943; /* Dark brownish-black ink */
            font-size: clamp(1.2rem, 5vw, 2rem);
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(74, 44, 15, 0.3);
            padding-bottom: 10px;
        }

        .scroll-text {
            font-family: 'Dancing Script', cursive;
            color: #2b1b0a;
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            line-height: 1.4;
            text-align: center;
            font-weight: 700;
        }

        /* UI */
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 20px; background: rgba(0, 0, 0, 0.5);
            color: var(--gold); border: 1px solid var(--gold);
            border-radius: 20px; text-decoration: none;
            font-family: 'Cinzel', serif; font-size: 14px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <!-- Space Background -->
    <canvas id="galaxy-canvas"></canvas>

    <a href="index.html" class="back-btn">← Return</a>

    <!-- Container for flying scrolls -->
    <div id="scene-3d"></div>

    <script>
        // --- 1. SUPER GALAXY BACKGROUND SCRIPT ---
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        const numStars = 200;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width, // Depth for 3D starfield effect
                size: Math.random() * 2
            });
        }

        function drawGalaxy() {
            // Create a trailing effect for hyper-speed feel
            ctx.fillStyle = 'rgba(5, 5, 15, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                // Move stars towards the camera
                s.z -= 2; 
                
                // Reset star if it passes the camera
                if (s.z <= 0) {
                    s.x = Math.random() * canvas.width;
                    s.y = Math.random() * canvas.height;
                    s.z = canvas.width;
                }

                // Calculate 3D to 2D projection
                let k = 128.0 / s.z;
                let px = (s.x - cx) * k + cx;
                let py = (s.y - cy) * k + cy;
                
                // Make stars bigger and brighter as they get closer
                let pSize = s.size * k;

                if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                    // Star glow
                    ctx.beginPath();
                    ctx.arc(px, py, pSize, 0, Math.PI * 2);
                    let intensity = (1 - s.z / canvas.width); // Brighter when closer
                    ctx.fillStyle = `rgba(255, 255, 255, ${intensity})`;
                    ctx.fill();
                }
            }
            requestAnimationFrame(drawGalaxy);
        }
        drawGalaxy();

        // Handle Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });


        // --- 2. FLY-THROUGH LETTERS SCRIPT ---
        const scene = document.getElementById('scene-3d');
        
        // Custom messages for Agrima
        const messages = [
            { h: "For Agrima", t: "Sitaro ke is samundar mein, tum meri sabse chamakti roshni ho." },
            { h: "The Magic", t: "Tumhari ek muskaan mere din ki saari thakan mita deti hai." },
            { h: "A Promise", t: "Chahe ye universe kitna bhi bada ho, mera dil hamesha tumhara rahega." },
            { h: "Forever", t: "Kunal aur Agrima... Ye kahani kabhi khatam nahi hogi." }
        ];

        let msgIndex = 0;

        function spawnLetter() {
            // Create the paper element
            const paper = document.createElement('div');
            paper.className = 'ancient-scroll';
            
            // Add content
            paper.innerHTML = `
                <h2 class="scroll-title">${messages[msgIndex].h}</h2>
                <p class="scroll-text">${messages[msgIndex].t}</p>
            `;
            
            scene.appendChild(paper);

            // GSAP 3D Fly-Through Animation
            // Timeline allows us to chain animations smoothly
            const tl = gsap.timeline({
                onComplete: () => {
                    // Remove element from DOM after it flies past the camera
                    paper.remove();
                    // Immediately spawn the next one to keep the loop going
                    spawnLetter();
                }
            });

            // The Animation Sequence
            tl.fromTo(paper, 
                // STARTING POINT: Deep inside the screen, invisible, slightly rotated
                { 
                    z: -2000, 
                    opacity: 0, 
                    rotationX: 10, 
                    rotationY: gsap.utils.random(-15, 15) // Slight random tilt
                },
                // ENDING POINT: Flies right past the camera (+800z is behind the user)
                {
                    z: 800, 
                    rotationX: -10, // Tilts up as it passes
                    rotationY: 0,
                    duration: 6, // 6 seconds for one full fly-by (adjust for speed)
                    ease: "power1.inOut", // Starts slow, speeds up in middle, slows at end
                    
                    // Complex Opacity handling during the flight
                    onUpdate: function() {
                        const progress = this.progress();
                        // Fade in quickly at the start
                        if (progress < 0.2) {
                            gsap.set(paper, { opacity: progress * 5 }); 
                        } 
                        // Stay fully visible in the middle
                        else if (progress >= 0.2 && progress < 0.8) {
                            gsap.set(paper, { opacity: 1 });
                        } 
                        // Fade out very quickly right before it hits the camera to create the "passing through" effect
                        else {
                            gsap.set(paper, { opacity: 1 - ((progress - 0.8) * 5) });
                        }
                    }
                }
            );

            // Update index for next message
            msgIndex = (msgIndex + 1) % messages.length;
        }

        // Start the sequence after a slight delay
        setTimeout(spawnLetter, 500);

    </script>
</body>
</html>
