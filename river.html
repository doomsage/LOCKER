<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cosmic Secret | Agrima</title>
    <!-- Elegant Font for the Secret Message -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            /* Pure black real universe theme */
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none; /* Prevents scroll while reading */
        }

        #cosmicCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Subtle UI for back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        .instruction {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Return</a>
    <div class="instruction">SWIPE TO REVEAL THE TRUTH</div>

    <canvas id="cosmicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Touch and Mouse Tracking
        let touch = { x: -1000, y: -1000, active: false };

        const updateTouch = (e) => {
            touch.active = true;
            if (e.touches) {
                touch.x = e.touches[0].clientX;
                touch.y = e.touches[0].clientY;
            } else {
                touch.x = e.clientX;
                touch.y = e.clientY;
            }
        };

        const endTouch = () => { touch.active = false; };

        window.addEventListener('touchstart', updateTouch);
        window.addEventListener('touchmove', updateTouch);
        window.addEventListener('touchend', endTouch);
        
        window.addEventListener('mousedown', updateTouch);
        window.addEventListener('mousemove', (e) => { if (touch.active) updateTouch(e); });
        window.addEventListener('mouseup', endTouch);

        // Secret Message Content
        const secretMessage = [
            "Agrima,",
            "Is anant andhere universe mein,",
            "tumhara aana ek jadu jaisa hai.",
            "Lakhon taro ke is bheed mein,",
            "tum meri sabse khoobsurat reality ho.",
            "",
            "I Love You. ❤️"
        ];

        // --- 1. Static Background Stars (Depth Layer) ---
        const bgStars = [];
        for(let i=0; i<200; i++) {
            bgStars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5,
                alpha: Math.random() * 0.5 + 0.1
            });
        }

        function drawBackground() {
            // Real deep space black
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Static distant stars
            bgStars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // --- 2. The Secret Message Reveal Logic ---
        function drawSecretMessage() {
            if (!touch.active) return; // Msg normaly nahi dikhega

            // Flashlight Effect: Create radial gradient at touch point
            // Only text inside this glowing radius will be visible
            let revealRadius = 60; // Kitna bada hissa dikhega
            let gradient = ctx.createRadialGradient(touch.x, touch.y, 10, touch.x, touch.y, revealRadius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Center full bright
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.6)'); // Fading
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); // Edge transparent

            ctx.fillStyle = gradient;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw Multiline Text
            let fontSize = canvas.width > 600 ? 30 : 20; // Mobile responsive text
            ctx.font = `300 ${fontSize}px 'Cinzel', serif`;
            
            let lineHeight = fontSize * 1.6;
            let startY = canvas.height / 2 - ((secretMessage.length - 1) * lineHeight) / 2;

            secretMessage.forEach((line, index) => {
                if(line.includes("❤️")) ctx.font = `bold ${fontSize + 4}px 'Montserrat', sans-serif`; // Highlight last line
                ctx.fillText(line, canvas.width / 2, startY + (index * lineHeight));
            });
        }

        // --- 3. Laminar Flowing Stars ---
        class LaminarStar {
            constructor() {
                this.reset(true);
            }

            reset(isInit = false) {
                this.x = isInit ? Math.random() * canvas.width : -50;
                this.baseY = Math.random() * canvas.height;
                this.y = this.baseY;
                this.size = Math.random() * 1.5 + 0.5;
                // Laminar speed (smooth constant flow)
                this.speed = Math.random() * 1.5 + 0.5; 
                
                // Real star colors (White, bluish-white, yellowish-white)
                const colors = ['#ffffff', '#e0f7fa', '#fff9c4'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // Moving forward smoothly
                this.x += this.speed;

                // Divert logic (The "plow" effect)
                let targetY = this.baseY;

                if (touch.active) {
                    let dx = this.x - touch.x;
                    let dy = this.baseY - touch.y; // Keep repulsion stable based on base line
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let influenceRadius = 120; // Space it clears out

                    if (dist < influenceRadius) {
                        // Push up or down based on where it is relative to the touch
                        let force = (influenceRadius - dist) / influenceRadius;
                        let pushDirection = dy > 0 ? 1 : -1; 
                        let pushStrength = 100; // How far it diverts
                        
                        targetY = this.baseY + (pushDirection * (force * pushStrength));
                    }
                }

                // Spring physics for smooth return to laminar flow
                this.y += (targetY - this.y) * 0.1;

                // Loop back
                if (this.x > canvas.width + 50) {
                    this.reset();
                }
            }

            draw() {
                // Add slight glow to flowing stars
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Reset shadow for performance
                ctx.shadowBlur = 0; 
            }
        }

        // Create flowing stars
        const flowingStars = [];
        const numFlowingStars = 350; // Dense enough to hide, beautiful to divert
        for(let i = 0; i < numFlowingStars; i++) {
            flowingStars.push(new LaminarStar());
        }

        // --- Animation Loop ---
        function animate() {
            drawBackground();
            
            // Draw message BEHIND the flowing stars
            drawSecretMessage();

            // Draw and update flowing stars
            flowingStars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
