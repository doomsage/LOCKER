<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fluid Heart River | Agrima</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; }
        
        /* Premium UI - Glassmorphism Back Button */
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            padding: 12px 24px; background: rgba(255, 255, 255, 0.1);
            color: #ffafcc; border-radius: 50px; text-decoration: none;
            font-family: 'Fredoka One', cursive; font-size: 14px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .back-btn:active { transform: scale(0.95); background: rgba(255, 117, 143, 0.3); }

        /* Super Cute Loading Screen */
        #loader {
            position: fixed; inset: 0; background: #050505; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ffafcc; font-family: 'Fredoka One', cursive; font-size: 20px;
            transition: opacity 1s ease;
        }
        .loader-heart { font-size: 60px; animation: beat 1s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-heart">💖</div>
        <p style="margin-top: 15px; letter-spacing: 2px;">Loading Cool Stuff for Agrima...</p>
    </div>

    <a href="index.html" class="back-btn">← Menu</a>

    <script>
        // Physics Engine Setup
        const { Engine, World, Bodies, Body, Vector } = Matter;
        let engine;
        let world;
        let particles = [];
        const numParticles = 70; // 70-80 is safe for mobile fps

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // 1. Initialize Matter.js Engine
            engine = Engine.create({
                gravity: { x: 0.1, y: 0 } // Light gravity left-to-right to keep the flow
            });
            world = engine.world;

            // 2. Create Fluid Boundaries (Invisible Walls)
            const params = { isStatic: true, render: { visible: false } };
            World.add(world, [
                Bodies.rectangle(width/2, -50, width, 100, params),         // Top
                Bodies.rectangle(width/2, height+50, width, 100, params),  // Bottom
                Bodies.rectangle(-50, height/2, 100, height, params),      // Left
                Bodies.rectangle(width+50, height/2, 100, height, params)  // Right
            ]);

            // 3. Create initial hearts
            for (let i = 0; i < numParticles; i++) {
                particles.push(new HeartFluidParticle(random(width), random(height)));
            }

            // Hide loader after setup
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            }, 1500);
        }

        function draw() {
            background(5, 5, 5, 90); // Darker BG with trails

            // Step the Physics Engine
            Engine.update(engine);

            // 4. Fluid Simulation Interactions
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.interact(particles, i);
                p.update();
                p.display();
            }
        }

        class HeartFluidParticle {
            constructor(x, y) {
                // p5 property
                this.size = random(12, 25);
                this.history = [];
                this.color = color(random(['#ff4d6d', '#ff758f', '#ff85a1', '#ffafcc']));
                this.hue = hue(this.color);
                
                // Matter.js property (Circle Body)
                const options = {
                    friction: 0.05,
                    restitution: 0.8, // Bouncy
                    density: 0.001,
                    collisionFilter: { group: -1 } // Particles don't collide with each other, but respond to forces
                };
                this.body = Bodies.circle(x, y, this.size/2, options);
                
                // Random starting velocity to create the river flow
                Body.setVelocity(this.body, { x: random(3, 6), y: random(-1, 1) });
                World.add(world, this.body);
            }

            // 5. Advanced Fluid Interactions (SPH-like)
            interact(others, index) {
                const pos = this.body.position;
                
                // Left-to-Right constant flow force
                Body.applyForce(this.body, pos, { x: 0.00005, y: 0 });

                // Touch/Mouse Force Divert
                if (mouseIsPressed) {
                    let d = dist(mouseX, mouseY, pos.x, pos.y);
                    if (d < 150) {
                        let pushVec = Vector.sub(pos, Vector.create(mouseX, mouseY));
                        let forceMagnitude = map(d, 0, 150, 0.002, 0); // Very strong push
                        Body.applyForce(this.body, pos, Vector.mult(Vector.normalise(pushVec), forceMagnitude));
                    }
                }

                // Wave movement (adds chaos)
                this.baseY = this.body.position.y;
                let waveY = sin(frameCount * 0.03 + (index * 0.1)) * 1.5;
                Body.setVelocity(this.body, { x: this.body.velocity.x, y: this.body.velocity.y + waveY });
            }

            update() {
                const pos = this.body.position;

                // 6. Cute Trail Trails (Smoothly tapered)
                this.history.push({ x: pos.x, y: pos.y });
                if (this.history.length > 25) {
                    this.history.shift();
                }

                // Reset position if off-screen right
                if (pos.x > width + 50) {
                    Body.setPosition(this.body, { x: -50, y: random(height) });
                    Body.setVelocity(this.body, { x: random(3, 6), y: random(-1, 1) });
                    this.history = [];
                }
            }

            display() {
                const pos = this.body.position;

                // Draw Trails (Neon Tapered Effect)
                noStroke();
                for (let i = 0; i < this.history.length; i++) {
                    let pPos = this.history[i];
                    // Alpha based on age
                    let alpha = map(i, 0, this.history.length, 0, 180);
                    // Size based on age (tapered)
                    let s = map(i, 0, this.history.length, 2, this.size);
                    // Glowing Neon trail
                    fill(red(this.color), green(this.color), blue(this.color), alpha);
                    this.drawHeartShape(pPos.x, pPos.y, s);
                }

                // Draw Main Body (Glowing)
                fill(this.color);
                this.drawHeartShape(pos.x, pos.y, this.size);
            }

            drawHeartShape(x, y, size) {
                beginShape();
                vertex(x, y);
                bezierVertex(x - size / 2, y - size / 2, x - size, y + size / 3, x, y + size);
                bezierVertex(x + size, y + size / 3, x + size / 2, y - size / 2, x, y);
                endShape(CLOSE);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
