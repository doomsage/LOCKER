<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart River | Agrima</title>
    <!-- Cute font for UI elements -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Phone par tap highlight aur selection disable karne ke liye */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none; /* Swipe scroll rokne ke liye */
        }

        /* Canvas jisme jadu hoga */
        #riverCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 8px 16px;
            background: rgba(255, 77, 109, 0.15);
            color: #ff4d6d;
            border: 2px solid rgba(255, 77, 109, 0.3);
            border-radius: 20px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .back-btn:active {
            background: rgba(255, 77, 109, 0.4);
            transform: scale(0.95);
        }

        /* Instruction Text */
        .instruction {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-family: 'Pacifico', cursive;
            color: #ff4d6d;
            font-size: 1.5rem;
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>
    <div class="instruction">Touch to divert the love flow... ✨</div>

    <canvas id="riverCanvas"></canvas>

    <script>
        const canvas = document.getElementById('riverCanvas');
        const ctx = canvas.getContext('2d');

        // Phone ke hisaab se canvas size set karna
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Emojis jo flow karenge
        const emojis = ['❤️', '💖', '💗', '💓', '💕', '💘'];
        
        // Touch/Mouse Tracking
        let touchX = -1000;
        let touchY = -1000;
        let isTouching = false;

        // Interaction Events (Mobile aur PC dono ke liye)
        window.addEventListener('touchstart', (e) => {
            isTouching = true;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', (e) => {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => {
            isTouching = false;
            touchX = -1000;
            touchY = -1000;
        });

        // Mouse events for PC testing
        window.addEventListener('mousedown', (e) => { isTouching = true; touchX = e.clientX; touchY = e.clientY; });
        window.addEventListener('mousemove', (e) => { if (isTouching) { touchX = e.clientX; touchY = e.clientY; } });
        window.addEventListener('mouseup', () => { isTouching = false; touchX = -1000; touchY = -1000; });

        class RiverHeart {
            constructor() {
                this.reset(true);
            }

            // Jab heart screen se bahar jaye toh wapas shuru karne ke liye
            reset(isInit = false) {
                // Pehli baar me screen ke andar faila do, baad me left se shuru karo
                this.x = isInit ? Math.random() * canvas.width : -50;
                
                // Screen ke center ke aas-paas flow karega (30% to 70% height me)
                this.baseY = canvas.height * 0.3 + Math.random() * (canvas.height * 0.4);
                this.y = this.baseY;
                
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.size = Math.random() * 15 + 20; // Emoji ka size
                this.speed = Math.random() * 1.5 + 1.5; // Left to right speed
                
                // Wave properties
                this.waveAmplitude = Math.random() * 30 + 20; // Kitna upar neeche jayega
                this.waveFrequency = Math.random() * 0.02 + 0.01;
                this.timeOffset = Math.random() * 1000;
                
                // Traces ke liye array
                this.history = [];
            }

            update() {
                // 1. Normal Wave Motion
                let waveOffset = Math.sin(Date.now() * this.waveFrequency + this.timeOffset) * this.waveAmplitude;
                let targetY = this.baseY + waveOffset;

                // 2. The Real Water Divert Logic (Agar touch ho raha hai)
                if (isTouching) {
                    let dx = this.x - touchX;
                    let dy = this.y - touchY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    let influenceRadius = 150; // Kitni door se paani hatega
                    
                    if (distance < influenceRadius) {
                        // Jab ungli paas ho, toh Y axis par force lagao
                        let force = (influenceRadius - distance) / influenceRadius;
                        let pushDirection = dy > 0 ? 1 : -1; // Upar hai toh upar dhaklo, neeche hai toh neeche
                        
                        let pushPower = 80; // Kitni jor se divert hoga
                        targetY += pushDirection * (force * pushPower);
                    }
                }

                // Smoothly move towards targetY (Is se ek fluid spring jesa motion aata hai)
                this.y += (targetY - this.y) * 0.1;

                // Move forward (Left to Right)
                this.x += this.speed;

                // 3. Record history for cute traces
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > 15) {
                    this.history.shift(); // Purane nishaan hata do
                }

                // Agar screen ke bahar nikal jaye right side se
                if (this.x > canvas.width + 50) {
                    this.reset();
                }
            }

            draw() {
                // 1. Draw Cute Traces (Pichhe chhutte nishaan)
                for (let i = 0; i < this.history.length; i++) {
                    let pos = this.history[i];
                    let alpha = i / this.history.length; // Purane wale halke honge
                    let traceSize = (this.size * 0.4) * alpha; // Purane wale chote honge
                    
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, traceSize, 0, Math.PI * 2);
                    // Glowing pink traces
                    ctx.fillStyle = `rgba(255, 77, 109, ${alpha * 0.4})`;
                    ctx.fill();
                }

                // 2. Draw Main Emoji
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Emoji ko draw karna
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        // Bohot saare hearts create karna
        const heartsCount = 60; // Phone ke liye perfect balance
        const heartsArray = [];
        for (let i = 0; i < heartsCount; i++) {
            heartsArray.push(new RiverHeart());
        }

        // Animation Loop
        function animate() {
            // Screen ko clear karna (halka sa transparent white flow effect ke liye)
            ctx.fillStyle = 'rgba(255, 240, 243, 0.4)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Agar user touch kar raha hai toh ek halka ripple/glow dikhao
            if (isTouching) {
                ctx.beginPath();
                ctx.arc(touchX, touchY, 60, 0, Math.PI * 2);
                let gradient = ctx.createRadialGradient(touchX, touchY, 0, touchX, touchY, 60);
                gradient.addColorStop(0, 'rgba(255, 77, 109, 0.2)');
                gradient.addColorStop(1, 'rgba(255, 77, 109, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            // Sabhi hearts ko update aur draw karna
            for (let i = 0; i < heartsArray.length; i++) {
                heartsArray[i].update();
                heartsArray[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
