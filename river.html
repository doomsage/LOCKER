<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Heart Stream | Agrima</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fff0f3; }
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 20px; background: #ff4d6d; color: white;
            border-radius: 30px; text-decoration: none; font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            font-size: 14px;
        }
        .ui-text {
            position: fixed; top: 10%; width: 100%; text-align: center;
            font-family: 'Pacifico', cursive; color: #ff4d6d; pointer-events: none;
            font-size: 1.8rem; text-shadow: 0 2px 10px rgba(255,255,255,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>
    <div class="ui-text">River of Hearts for Agrima ✨</div>

    <script>
        let hearts = [];
        const numHearts = 35; // Screen par bheed nahi hogi, stream lagegi

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numHearts; i++) {
                hearts.push(new HeartParticle());
            }
        }

        function draw() {
            // Soft trail background for smooth motion
            background(255, 240, 243, 150); 

            for (let h of hearts) {
                h.update();
                h.display();
            }
        }

        class HeartParticle {
            constructor() {
                this.init(true); // Start anywhere on screen first time
            }

            init(firstTime = false) {
                // Left se shuru hoga
                this.x = firstTime ? random(width) : -50;
                
                // Sirf middle section mein stream flow karegi (height ka 40% to 60%)
                this.y = random(height * 0.35, height * 0.65);
                this.baseY = this.y;
                
                this.size = random(15, 30);
                this.speed = random(2, 5);
                this.waveRange = random(30, 60); // Kitna upar neeche jayega
                this.waveSpeed = random(0.02, 0.05);
                this.offset = random(1000);
                
                // History for the "Cute Traces" (Tails)
                this.history = [];
                
                // Soft pink/red shades
                this.color = color(random([ '#ff4d6d', '#ff758f', '#ff85a1', '#ffafcc' ]));
            }

            update() {
                // 1. Movement: Left to Right
                this.x += this.speed;

                // 2. Wave Motion: Sine Wave logic
                let wave = sin(frameCount * this.waveSpeed + this.offset) * this.waveRange;
                this.y = this.baseY + wave;

                // 3. Interaction: Divert on Touch/Mouse
                let d = dist(mouseX, mouseY, this.x, this.y);
                if (d < 120) {
                    // Agar mouse/touch pass hai, toh force calculate karo
                    let angle = atan2(this.y - mouseY, this.x - mouseX);
                    let push = map(d, 0, 120, 10, 0);
                    this.x += cos(angle) * push;
                    this.y += sin(angle) * push;
                    this.baseY += sin(angle) * (push * 0.2); // Stream ko thoda shift karega
                }

                // 4. Trace Management
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 12) {
                    this.history.shift();
                }

                // Reset if it goes off screen
                if (this.x > width + 50) {
                    this.init(false);
                }
            }

            display() {
                // Draw Traces (Cute fading tails)
                for (let i = 0; i < this.history.length; i++) {
                    let pos = this.history[i];
                    let opacity = map(i, 0, this.history.length, 0, 150);
                    let s = map(i, 0, this.history.length, 0, this.size);
                    
                    noStroke();
                    fill(red(this.color), green(this.color), blue(this.color), opacity);
                    this.drawHeart(pos.x, pos.y, s);
                }

                // Draw Main Heart
                fill(this.color);
                this.drawHeart(this.x, this.y, this.size);
            }

            // Custom Heart Shape Drawing
            drawHeart(x, y, size) {
                beginShape();
                vertex(x, y);
                bezierVertex(x - size / 2, y - size / 2, x - size, y + size / 3, x, y + size);
                bezierVertex(x + size, y + size / 3, x + size / 2, y - size / 2, x, y);
                endShape(CLOSE);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
