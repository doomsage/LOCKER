<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrima & Kunal | Forever</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --p1: #ff758f; --p2: #ffafcc; --blue: #00b4d8; --text: #590d22; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #fff0f3; font-family: 'Quicksand', sans-serif; color: var(--text); overflow-x: hidden; }

        section { min-height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

        /* --- 1. HERO --- */
        .hero h1 { font-family: 'Pacifico', cursive; font-size: 3.5rem; color: var(--p1); }
        
        /* --- 2. HEART RIVER --- */
        #river-container { height: 100vh; background: #ffe5ec; cursor: crosshair; }
        #river-canvas { width: 100%; height: 100%; }

        /* --- 3. LOVE LETTERS --- */
        .letters-container { background: #ffccd5; padding: 50px 0; }
        .letter { 
            width: 80%; max-width: 300px; background: white; padding: 20px; 
            margin: 40px auto; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: scale(0) translateZ(-500px); opacity: 0;
        }

        /* --- 4. THE K & A BALLS --- */
        .physics-section { height: 100vh; display: flex; align-items: center; justify-content: space-around; width: 100%; background: #fff; }
        .ball { 
            width: 80px; height: 80px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 2rem; color: white;
            font-weight: bold; cursor: pointer; z-index: 100; position: relative;
        }
        #ballK { background: var(--blue); box-shadow: 0 0 20px var(--blue); }
        #ballA { background: var(--p1); box-shadow: 0 0 20px var(--p1); }
        #string-canvas { position: absolute; inset: 0; pointer-events: none; }

        /* --- 5. FINAL HEART --- */
        #big-heart { font-size: 100px; cursor: pointer; transition: 0.3s; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* --- 6. PROPOSAL POPUP --- */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none;
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px;
        }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; margin: 10px; font-size: 1.2rem; cursor: pointer; }
        #yes-btn { background: var(--p1); color: white; }
        #wait-btn { background: #555; color: white; }
        
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <section class="hero">
        <h1 id="main-name">Agrima ✨</h1>
        <p>Scroll down to see the magic...</p>
    </section>

    <section id="river-container">
        <canvas id="river-canvas"></canvas>
        <div style="position: absolute; top: 10px; color: var(--p1);">Touch the flow...</div>
    </section>

    <section class="letters-container">
        <div class="letter">Agrima, tumhari smile sabse pyaari hai... ❤️</div>
        <div class="letter">Har din tumse baat karna meri habit ban gayi hai... 🧸</div>
        <div class="letter">Tum mere liye bohot special ho... ✨</div>
    </section>

    <section class="physics-section">
        <canvas id="string-canvas"></canvas>
        <div id="ballK" class="ball" onclick="tapBall('K')">K</div>
        <div id="ballA" class="ball" onclick="tapBall('A')">A</div>
        <div style="position: absolute; top: 20px;">Tap both letters to connect</div>
    </section>

    <section>
        <div id="big-heart" onclick="openHeart()">❤️</div>
        <p>Tap to Open</p>
    </section>

    <div id="overlay">
        <div id="modal-content" class="fade-in" style="text-align: center;">
            </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- RIVER ANIMATION ---
        const rCanvas = document.getElementById('river-canvas');
        const rCtx = rCanvas.getContext('2d');
        rCanvas.width = window.innerWidth;
        rCanvas.height = window.innerHeight;

        let hearts = [];
        let mouse = { x: -1000, y: -1000 };

        class RiverHeart {
            constructor() {
                this.x = Math.random() * rCanvas.width;
                this.y = Math.random() * rCanvas.height;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 2 + 1;
                this.history = [];
            }
            draw() {
                rCtx.fillStyle = '#ff758f';
                rCtx.beginPath();
                rCtx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
                rCtx.fill();
                
                // Traces
                this.history.forEach((h, i) => {
                    rCtx.fillStyle = `rgba(255, 117, 143, ${i/20})`;
                    rCtx.beginPath();
                    rCtx.arc(h.x, h.y, (this.size/2)*(i/20), 0, Math.PI*2);
                    rCtx.fill();
                });
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    this.x -= dx/dist * 5;
                    this.y -= dy/dist * 5;
                }

                this.y -= this.speedY;
                if(this.y < -20) this.y = rCanvas.height + 20;

                this.history.push({x: this.x, y: this.y});
                if(this.history.length > 20) this.history.shift();
            }
        }

        for(let i=0; i<60; i++) hearts.push(new RiverHeart());
        function animateRiver() {
            rCtx.clearRect(0,0,rCanvas.width, rCanvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animateRiver);
        }
        animateRiver();
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchstart', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        // --- LETTERS REVEAL ---
        gsap.utils.toArray(".letter").forEach(l => {
            gsap.to(l, {
                scrollTrigger: { trigger: l, start: "top 90%" },
                opacity: 1, scale: 1, z: 0, duration: 1.5, ease: "power4.out"
            });
        });

        // --- K & A CONNECTION ---
        let tapped = { K: false, A: false };
        const sCanvas = document.getElementById('string-canvas');
        const sCtx = sCanvas.getContext('2d');
        sCanvas.width = window.innerWidth;
        sCanvas.height = window.innerHeight;

        function tapBall(id) {
            tapped[id] = true;
            document.getElementById('bgMusic').play();
            if(tapped.K && tapped.A) connectStrings();
        }

        let pulseVal = 0;
        function connectStrings() {
            gsap.to({}, { duration: 100, onUpdate: () => {
                sCtx.clearRect(0,0,sCanvas.width, sCanvas.height);
                let kRect = document.getElementById('ballK').getBoundingClientRect();
                let aRect = document.getElementById('ballA').getBoundingClientRect();
                
                let startX = kRect.left + 40, startY = kRect.top + 40;
                let endX = aRect.left + 40, endY = aRect.top + 40;

                pulseVal += 0.05;
                let wave = Math.sin(pulseVal) * 10;

                sCtx.beginPath();
                sCtx.moveTo(startX, startY);
                sCtx.bezierCurveTo(startX+50, startY+wave, endX-50, endY-wave, endX, endY);
                sCtx.strokeStyle = pulseVal % 6 < 3 ? 'var(--blue)' : 'var(--p1)';
                sCtx.lineWidth = 4;
                sCtx.stroke();
            }});
        }

        // --- FINAL PROPOSAL ---
        function openHeart() {
            document.getElementById('overlay').style.display = 'flex';
            showStep1();
        }

        function showStep1() {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h1 style="font-size: 5rem;">💔</h1>
                <h2 style="font-family: 'Pacifico'; margin: 20px 0;">Agrima, I Love You! ❤️</h2>
                <p>Will you be mine forever?</p>
                <button id="yes-btn" class="btn" onclick="sayYes()">YES!</button>
                <button id="wait-btn" class="btn" onclick="sayWait()">Wait</button>
            `;
        }

        function sayWait() {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h1 style="font-size: 4rem;">🥺</h1>
                <h2>Kab tak wait karwaoge?</h2>
                <button class="btn" style="background:#eee; color:#333" onclick="finalWait('2 saal')">2 saal</button>
                <button class="btn" style="background:#eee; color:#333" onclick="finalWait('9 saal')">9 saal</button>
            `;
        }

        function finalWait(time) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h1 style="font-size: 4rem;">😌</h1>
                <h2>Okay, I'll wait for you for ${time}... <br>But my love remains yours.</h2>
                <button class="btn" onclick="location.reload()" style="background:var(--p1); color:white; margin-top:20px;">❤️</button>
            `;
        }

        function sayYes() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h1 style="font-size: 5rem;">💖🥰💖</h1>
                <h2 style="font-family: 'Pacifico';">Best Day Ever!</h2>
                <p>Kunal ❤️ Agrima Forever.</p>
            `;
        }
    </script>
</body>
</html>
