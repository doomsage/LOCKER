<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Agrima | Infinite Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --p1: #ff758f; --p2: #ffafcc; --p3: #fcd5ce;
            --white: #ffffff; --text: #590d22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--p3); 
            font-family: 'Fredoka One', cursive; 
            overflow: hidden; /* Phone par scroll hide karke custom feel */
            height: 100vh; width: 100vw;
        }

        /* --- 1. THE BIG ENTER BUTTON (Music Trigger) --- */
        #entry-gate {
            position: fixed; inset: 0; background: radial-gradient(circle, var(--p2), var(--p1));
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }
        .touch-btn {
            width: 120px; height: 120px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            box-shadow: 0 0 30px rgba(255,255,255,0.8); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* --- 2. BACKGROUND ANIMATIONS (Moving Blobs) --- */
        .blob {
            position: absolute; width: 200px; height: 200px; background: var(--p2);
            filter: blur(40px); border-radius: 50%; z-index: 1; opacity: 0.6;
        }

        /* --- 3. FLOATING HEART PARTICLES --- */
        #particle-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2; }

        /* --- 4. MAIN CONTENT (Phone Optimized) --- */
        #main-stage {
            display: none; position: relative; height: 100vh; width: 100vw;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        .agrima-title {
            font-size: 3rem; color: var(--text); text-align: center;
            line-height: 1.2; text-shadow: 2px 2px var(--white);
        }

        .floating-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 20px; margin: 20px; width: 85%;
            border: 3px solid var(--white); box-shadow: 0 15px 35px rgba(255, 117, 143, 0.3);
            transform: perspective(1000px) rotateX(10deg);
        }

        /* --- 5. THE ULTIMATE YES BUTTON --- */
        .yes-wrap { margin-top: 30px; position: relative; }
        .huge-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white; border: none; padding: 20px 60px; font-size: 2rem;
            border-radius: 50px; font-family: 'Pacifico', cursive;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.5);
            cursor: pointer; animation: jiggle 2s infinite;
        }
        @keyframes jiggle {
            0%, 100% { transform: scale(1) rotate(0); }
            10%, 20% { transform: scale(1.1) rotate(-3deg); }
            30%, 50%, 70% { transform: scale(1.1) rotate(3deg); }
            40%, 60% { transform: scale(1.1) rotate(-3deg); }
        }

        /* Music Bar Animation */
        .music-visualizer {
            display: flex; align-items: flex-end; gap: 3px; height: 30px; margin-top: 15px;
        }
        .bar { width: 4px; background: var(--p1); animation: equalize 0.8s infinite alternate; }
        @keyframes equalize { from { height: 5px; } to { height: 25px; } }

    </style>
</head>
<body>

    <div id="entry-gate" onclick="unlockLove()">
        <div class="touch-btn">❤️</div>
        <h2 style="margin-top: 20px; font-family: 'Pacifico';">Agrima, touch the heart...</h2>
        <p style="font-size: 14px; opacity: 0.8; margin-top: 10px;">(Please turn up the volume 🔊)</p>
    </div>

    <canvas id="particle-canvas"></canvas>
    <div class="blob" id="b1"></div>
    <div class="blob" id="b2"></div>

    <div id="main-stage">
        <div class="music-visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
        </div>

        <h1 class="agrima-title">Hey <br><span style="color: var(--p1); font-family: 'Pacifico';">Agrima!</span></h1>

        <div class="floating-card">
            <p style="font-size: 1.1rem; line-height: 1.6; text-align: center;">
                Aapke liye mere paas <b>infinite</b> pyaar hai. <br>
                Aap meri favorite error ho jise main kabhi fix nahi karna chahta! 🧸✨
            </p>
        </div>

        <div class="yes-wrap">
            <button class="huge-yes" onclick="theGrandFinale()">YES! ❤️</button>
        </div>
        
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">(No button error 404: Not Found)</p>
    </div>

    <audio id="romanticSong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- UNLOCK FUNCTION ---
        function unlockLove() {
            // Play Music
            const audio = document.getElementById('romanticSong');
            audio.play().catch(e => console.log("Music blocked, waiting for interaction"));

            // Hide Gate
            gsap.to("#entry-gate", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('entry-gate').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                startUltraAnimations();
            }});
        }

        // --- ULTRA ANIMATIONS (GSAP & Canvas) ---
        function startUltraAnimations() {
            // Move Blobs randomly
            gsap.to("#b1", { x: "80vw", y: "70vh", duration: 10, repeat: -1, yoyo: true, ease: "sine.inOut" });
            gsap.to("#b2", { x: "-20vw", y: "30vh", duration: 8, repeat: -1, yoyo: true, ease: "sine.inOut" });

            // Floating Card Animation
            gsap.to(".floating-card", { y: -20, repeat: -1, yoyo: true, duration: 2, ease: "power1.inOut" });

            // Particles
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 50;
                    this.size = Math.random() * 15 + 5;
                    this.speedY = Math.random() * 2 + 1;
                    this.angle = Math.random() * 360;
                }
                update() {
                    this.y -= this.speedY;
                    this.angle += 1;
                    if (this.y < -50) this.y = canvas.height + 50;
                }
                draw() {
                    ctx.fillStyle = '#ffafcc';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function init() {
                for (let i = 0; i < 40; i++) particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            init(); animate();
        }

        // --- GRAND FINALE ---
        function theGrandFinale() {
            const audio = document.getElementById('romanticSong');
            audio.volume = 1;

            // Confetti Explosion
            var end = Date.now() + (15 * 1000);
            var colors = ['#ff4d6d', '#ffafcc', '#ffffff'];

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });

                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            // Final Message
            document.getElementById('main-stage').innerHTML = `
                <div style="text-align:center; animation: bounceIn 1s;">
                    <h1 style="font-size: 4rem; color: #ff4d6d; font-family: 'Pacifico';">Yayyy! ❤️</h1>
                    <h2 style="font-size: 1.5rem; margin-top: 20px;">I Love You, Agrima!</h2>
                    <p style="margin-top: 15px;">Aap meri duniya ho! 🌎✨</p>
                    <div style="font-size: 80px; margin-top: 20px;">👩‍❤️‍👨🌷💍</div>
                </div>
            `;
        }
    </script>
</body>
</html>
